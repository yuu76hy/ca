name: Casaos-Renew-Parallel-Optimized
on:
  workflow_dispatch:
  repository_dispatch:
    types: [renew_casaos_snapshot]

env:
  ZSTD_COMPRESS_LEVEL: 6
  POLL_INTERVAL: 30
  TARGET_RUN_MINUTES: 10
  PERSONAL_DATA_DIRS: "/var/lib/docker /etc/casaos /var/lib/casaos /DATA"
  REMOTE_BACKUP_BASE: "/aaa"
  LOCAL_BACKUP_DIR: "/tmp/casaos-backup"
  LOCAL_AAA_DIR: "/aaa"
  SSH_USER: "root"
  LOG_PREFIX: "[log]"

jobs:
  casaos-deploy:
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    env:
      ROOTS_PASSWORD: ${{ secrets.ROOTS_PASSWORD }}
      USER_PAT: ${{ secrets.USER_PAT }}
      REPO: ${{ secrets.REPO }}
      TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
      SSH_PASS: ${{ secrets.ROOTS_PASSWORD }}

    steps:
      - name: 1-Init + Tailscale networking
        run: |
          echo "${LOG_PREFIX} Start init"
          sudo apt update -y -qq
          sudo apt install -y curl wget jq zstd rsync sshpass -qq
          sudo rm -rf /tmp/* /var/tmp/*

          if [ -n "${TAILSCALE_AUTH_KEY}" ]; then
            curl -fsSL https://tailscale.com/install.sh | sudo bash
            sudo systemctl enable --now tailscaled
            sudo tailscale up --authkey="${TAILSCALE_AUTH_KEY}" --hostname="gh-runner-${GITHUB_RUN_ID}" --accept-routes --reset
          fi
          echo "${LOG_PREFIX} Tailscale ready"

      - name: 2-Prepare directories and permissions
        run: |
          sudo mkdir -p "${LOCAL_BACKUP_DIR}" "${LOCAL_AAA_DIR}" /run/docker
          sudo chown -R runner:runner "${LOCAL_BACKUP_DIR}" "${LOCAL_AAA_DIR}"
          echo "${LOG_PREFIX} Directories ready"

      - name: 3-Parallel: Pull backup + Install environment
        run: |
          echo "${LOG_PREFIX} Start parallel tasks"
          mkdir -p "${LOCAL_BACKUP_DIR}"
          FLAG_FILE="${LOCAL_BACKUP_DIR}/.backup_found"
          rm -f "${FLAG_FILE}"

          # Thread A: 只拉取备份，不解压
          (
            if [ -n "${TAILSCALE_AUTH_KEY}" ] && [ -n "${SSH_PASS}" ]; then
              TARGET_IP=$(sudo tailscale status --json 2>/dev/null | jq -r '.Peers[] | select(.Online == true and (.HostName | contains("gh-runner"))) | .TailscaleIPs[0]' | head -n 1 || true)
              if [ -n "${TARGET_IP}" ]; then
                LATEST=$(sshpass -p "${SSH_PASS}" ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=5 "${SSH_USER}@${TARGET_IP}" "ls -t ${REMOTE_BACKUP_BASE}/casaos-*.tar.zst 2>/dev/null | head -n 1" || true)
                if [ -n "${LATEST}" ]; then
                  LOCAL_FILE="${LOCAL_BACKUP_DIR}/$(basename "${LATEST}")"
                  sshpass -p "${SSH_PASS}" rsync -az --partial --rsh="ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=15" "${SSH_USER}@${TARGET_IP}:${LATEST}" "${LOCAL_FILE}"
                  sshpass -p "${SSH_PASS}" ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=5 "${SSH_USER}@${TARGET_IP}" "sudo rm -f '${LATEST}'"
                  echo "${LOCAL_FILE}" > "${FLAG_FILE}"
                fi
              fi
            fi
          ) & PID1=$!

          # Thread B: 安装 Docker & CasaOS
          (
            export DEBIAN_FRONTEND=noninteractive
            curl -fsSL https://get.docker.com | sudo bash
            curl -fsSL https://get.casaos.io | sudo bash || { sleep 3; curl -fsSL https://get.casaos.io | sudo bash; }

            if [ -n "${SSH_PASS}" ]; then
              echo "${SSH_USER}:${SSH_PASS}" | sudo chpasswd
              echo "${SSH_USER} ALL=(ALL) NOPASSWD: ALL" | sudo tee /etc/sudoers.d/"${SSH_USER}"
              sudo usermod -aG docker "${SSH_USER}"
              sudo usermod -aG docker runner
            fi

            sudo systemctl stop docker containerd casaos
            sync
          ) & PID2=$!

          # 先等 B 完成（安装+停服务）
          wait "${PID2}"
          echo "${LOG_PREFIX} Thread B (install) finished"

          # 判断是否有备份
          if [ -f "${FLAG_FILE}" ]; then
            LOCAL_FILE=$(cat "${FLAG_FILE}")
            rm -f "${FLAG_FILE}"
            if [ -f "${LOCAL_FILE}" ]; then
              echo "${LOG_PREFIX} Restore backup..."
              sudo tar -I "zstd -d -T2" -xf "${LOCAL_FILE}" -C / --overwrite --preserve-permissions 2>/dev/null
              sudo rm -f "${LOCAL_FILE}"
            fi
          else
            echo "${LOG_PREFIX} No backup, use clean install"
          fi

          # 再等 A 结束
          wait "${PID1}"
          echo "${LOG_PREFIX} All parallel tasks done"

      - name: 4-Start all services
        run: |
          sudo systemctl enable --now docker containerd
          sleep 2
          sudo systemctl enable --now casaos
          echo "${LOG_PREFIX} Docker: $(sudo systemctl is-active docker 2>/dev/null || true)"
          echo "${LOG_PREFIX} CasaOS: $(sudo systemctl is-active casaos 2>/dev/null || true)"

      - name: 5-Stable running
        timeout-minutes: 360
        run: |
          SEC=$((TARGET_RUN_MINUTES*60))
          ELAPSED=0
          while [ ${ELAPSED} -lt ${SEC} ]; do
            MIN=$((ELAPSED/60))
            echo "${LOG_PREFIX} Running: ${MIN}/${TARGET_RUN_MINUTES} min"
            sleep 60
            ELAPSED=$((ELAPSED+60))
          done

      - name: 6-Backup, trigger, clean
        if: always()
        run: |
          sudo mkdir -p "${LOCAL_BACKUP_DIR}" "${LOCAL_AAA_DIR}"
          sudo systemctl stop casaos docker containerd
          sync

          SNAP="casaos-full-$(date +%Y%m%d-%H%M%S).tar.zst"
          LOCAL_FILE="${LOCAL_BACKUP_DIR}/${SNAP}"
          sudo tar -I "zstd -6 -T2 --long=30" -cf "${LOCAL_FILE}" \
            --exclude='/*/logs' --exclude='/*/tmp' --exclude='/*/cache' \
            ${PERSONAL_DATA_DIRS} || true

          if [ -n "${USER_PAT}" ] && [ -n "${REPO}" ]; then
            curl -s -f -X POST \
              -H "Authorization: Bearer ${USER_PAT}" \
              https://api.github.com/repos/"${REPO}"/dispatches \
              -d '{"event_type":"renew_casaos_snapshot"}' || true
          fi

          if [ -f "${LOCAL_FILE}" ] && [ -s "${LOCAL_FILE}" ]; then
            sudo mv "${LOCAL_FILE}" "${LOCAL_AAA_DIR}/"
            TARGET_FILE="${LOCAL_AAA_DIR}/${SNAP}"
            while [ -f "${TARGET_FILE}" ]; do
              echo "${LOG_PREFIX} Waiting for backup to be deleted..."
              sleep "${POLL_INTERVAL}"
            done
          fi

          sudo rm -rf "${LOCAL_BACKUP_DIR}" /tmp/*
          echo "${LOG_PREFIX} All tasks finished"
